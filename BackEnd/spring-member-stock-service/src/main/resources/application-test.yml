spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:stock-service-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

toss:
  api:
    base-url: ${TOSS_API_BASE_URL}
    client-id: ${TOSS_API_CLIENT_ID}
    client-secret: ${TOSS_API_CLIENT_SECRET}
