spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      password: ${SPRING_DATA_REDIS_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    properties:
      hibernate:
        default_schema: ${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED}
    default-schema: ${SPRING_FLYWAY_DEFAULT_SCHEMA}
    schemas: ${SPRING_FLYWAY_SCHEMAS}
    create-schemas: false
    clean-disabled: true

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}

toss:
  api:
    base-url: ${TOSS_API_BASE_URL}
    client-id: ${TOSS_API_CLIENT_ID}
    client-secret: ${TOSS_API_CLIENT_SECRET}

logging:
  level:
    com.springmsa.memberstockservice: info
    org.springframework.security: warn
