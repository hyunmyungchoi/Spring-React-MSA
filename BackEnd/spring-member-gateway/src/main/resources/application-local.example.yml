spring:
  config:
    activate:
      on-profile: local

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - ${GATEWAY_CORS_ALLOWED_ORIGIN}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: member-bff-websocket
              uri: ${GATEWAY_BFF_WEBSOCKET_URI}
              order: -1
              predicates:
                - Path=/bff/chat/ws
              filters:
                - StripPrefix=1

            - id: member-bff-service
              uri: ${GATEWAY_BFF_URI}
              predicates:
                - Path=/bff/**
              filters:
                - StripPrefix=1
                - RewriteLocationResponseHeader=AS_IN_REQUEST, Location, ${PUBLIC_ORIGIN}

            - id: user-service
              uri: ${GATEWAY_USER_SERVICE_URI}
              predicates:
                - Path=/api/user/**

            - id: member-community-service
              uri: ${GATEWAY_COMMUNITY_SERVICE_URI}
              predicates:
                - Path=/api/community/**

            - id: member-stock-service
              uri: ${GATEWAY_STOCK_SERVICE_URI}
              predicates:
                - Path=/api/stock/**

            - id: authorization-server
              uri: ${GATEWAY_AUTHORIZATION_SERVER_URI}
              predicates:
                - Path=/oauth2/**,/.well-known/openid-configuration,/.well-known/oauth-authorization-server,/.well-known/oauth-protected-resource,/userinfo,/login,/login/**,/logout,/connect/**
              filters:
                - PreserveHostHeader
                - RewriteLocationResponseHeader=AS_IN_REQUEST, Location, ${PUBLIC_ORIGIN}
