spring:
  config:
    activate:
      on-profile: local

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: member-bff-service
              uri: http://localhost:8079
              predicates:
                - Path=/bff/**

            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/user/**

            - id: member-community-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/community/**

            - id: member-stock-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/stock/**

            - id: authorization-server
              uri: http://localhost:9000
              predicates:
                - Path=/oauth2/**,/.well-known/**,/userinfo,/login,/login/**,/logout,/connect/**
              filters:
                - PreserveHostHeader
