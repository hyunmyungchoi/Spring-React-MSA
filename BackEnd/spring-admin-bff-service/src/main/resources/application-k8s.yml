spring:
  config:
    activate:
      on-profile: k8s

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          admin-bff:
            provider: admin-auth-server
            client-id: ${ADMIN_BFF_CLIENT_ID:admin-bff-client}
            client-secret: ${ADMIN_BFF_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: ${ADMIN_BFF_OAUTH2_REDIRECT_URI}
            scope:
              - openid
              - profile
        provider:
          admin-auth-server:
            authorization-uri: ${ADMIN_BFF_OAUTH2_AUTHORIZATION_URI}
            token-uri: ${ADMIN_BFF_OAUTH2_TOKEN_URI:http://spring-admin-gateway:8090/oauth2/token}
            user-info-uri: ${ADMIN_BFF_OAUTH2_USERINFO_URI:http://spring-admin-gateway:8090/userinfo}
            jwk-set-uri: ${ADMIN_BFF_OAUTH2_JWK_SET_URI:http://spring-admin-gateway:8090/oauth2/jwks}
            user-name-attribute: sub

admin-bff:
  frontend:
    redirect-uri: ${ADMIN_BFF_FRONTEND_REDIRECT_URI}

  oauth2:
    end-session-uri: ${ADMIN_BFF_OAUTH2_END_SESSION_URI}
    logout-uri: ${ADMIN_BFF_OAUTH2_LOGOUT_URI}

  api:
    user-api-base-url: ${ADMIN_BFF_API_USER_API_BASE_URL:http://spring-member-gateway:8080}
    user-internal-base-url: ${ADMIN_BFF_API_USER_INTERNAL_BASE_URL:http://spring-user-service:8081}

springmsa:
  internal-api:
    token: ${SPRING_MSA_INTERNAL_API_TOKEN}
