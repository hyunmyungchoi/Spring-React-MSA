server:
  port: 8087
  servlet:
    session:
      cookie:
        name: ADMINSESSIONID
        http-only: true
        same-site: lax

spring:
  application:
    name: spring-admin-bff-service

  session:
    store-type: redis
    data:
      redis:
        namespace: spring:session:admin-bff

admin-bff:
  registration:
    enabled: true
  member-session:
    redis:
      namespace: spring:session:bff
  member-presence:
    redis:
      namespace: spring:presence:member-bff
    stream:
      key: spring:presence:member-bff:events
      default-limit: 50

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus

logging:
  charset:
    console: UTF-8
  level:
    com.springmsa.adminbff: debug

springmsa:
  internal-api:
    header-name: X-Internal-Token
