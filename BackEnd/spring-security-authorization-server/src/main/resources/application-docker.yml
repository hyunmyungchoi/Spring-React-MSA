spring:
  config:
    activate:
      on-profile: docker

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  security:
    oauth2:
      authorizationserver:
        issuer: ${AUTH_SERVER_ISSUER:http://spring-member-gateway:8080}
        client:
          bff-client:
            registration:
              client-id: ${BFF_CLIENT_ID:bff-client}
              client-secret: ${BFF_CLIENT_SECRET_HASH:$2a$10$BDeXFNHccQiu0ef5vYr/Bu0fAjSQzCgKc5NBppHdETy1G.W4KJzbS}
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - ${BFF_OAUTH2_REDIRECT_URI:http://localhost:5173/bff/login/oauth2/code/member-bff}
              post-logout-redirect-uris:
                - ${BFF_POST_LOGOUT_REDIRECT_URI:http://localhost:5173/auth}
              scopes:
                - openid
                - profile
            require-authorization-consent: false
            require-proof-key: false

          admin-bff-client:
            registration:
              client-id: ${ADMIN_BFF_CLIENT_ID:admin-bff-client}
              client-secret: ${ADMIN_BFF_CLIENT_SECRET_HASH:$2a$10$Dm7Jh0Txq5XD7GRJXZSFFuIZQL1fMzpohFZJPM2EcFVPJNDsfveWi}
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - ${ADMIN_BFF_OAUTH2_REDIRECT_URI:http://localhost:5176/admin-bff/login/oauth2/code/admin-bff}
              post-logout-redirect-uris:
                - ${ADMIN_BFF_POST_LOGOUT_REDIRECT_URI:http://localhost:5176}
                - ${ADMIN_BFF_POST_LOGOUT_LOGIN_REDIRECT_URI:http://localhost:5176/auth}
              scopes:
                - openid
                - profile
            require-authorization-consent: false
            require-proof-key: false

app:
  frontend:
    user-login-uri: ${USER_FRONTEND_LOGIN_URI:http://localhost:5173/auth}
    admin-login-uri: ${ADMIN_FRONTEND_LOGIN_URI:http://localhost:5176/auth}

  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://spring-user-service:8081}
