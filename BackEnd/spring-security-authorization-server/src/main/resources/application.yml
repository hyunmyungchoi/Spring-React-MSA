server:
  port: 9000

spring:
  application:
    name: spring-security-authorization-server

  data:
    redis:
      host: localhost
      port: 16379

  security:
    oauth2:
      authorizationserver:
        issuer: http://localhost:8080 # Gateway
        client:
          shell-client:
            registration:
              client-id: "shell-client"
              client-authentication-methods:
                - "none"
              authorization-grant-types:
                - "authorization_code"
              redirect-uris:
                - "http://127.0.0.1:5173/login/oauth2/code/shell-client"
              post-logout-redirect-uris:
                - "http://127.0.0.1:5173/"
              scopes:
                - "openid"
                - "profile"
            require-authorization-consent: true
            require-proof-key: true
          bff-client:
            registration:
              client-id: bff-client
              client-secret: "$2a$10$BDeXFNHccQiu0ef5vYr/Bu0fAjSQzCgKc5NBppHdETy1G.W4KJzbS"
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - authorization_code
                - refresh_token
              redirect-uris:
                - http://localhost:8080/bff/auth/callback
              post-logout-redirect-uris:
                - http://localhost:8080/
              scopes:
                - openid
                - profile
            require-authorization-consent: false
            require-proof-key: false

app:
  user-service:
    base-url: "http://localhost:8081"

logging:
  charset:
    console: UTF-8
  level:
    com.springmsa.authserver: debug
    org.springframework.security: trace