server:
  port: 9000
  forward-headers-strategy: framework

spring:
  application:
    name: spring-security-authorization-server

app:
  otp:
    expose-dev-otp: ${APP_OTP_EXPOSE_DEV_OTP:false}
    email:
      sender: dev
      ttl-seconds: 180
      resend-cooldown-seconds: 5
      max-verify-attempts: 5
    whatsapp:
      sender: ${APP_OTP_WHATSAPP_SENDER:dev}
      ttl-seconds: 180
      resend-cooldown-seconds: 5
      max-verify-attempts: 5
      graph-api-base-url: ${WHATSAPP_GRAPH_API_BASE_URL:https://graph.facebook.com/v25.0}
      phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
      access-token: ${WHATSAPP_ACCESS_TOKEN:}
      template-name: ${WHATSAPP_TEMPLATE_NAME:authentication_code_copy_code_button}
      language-code: ${WHATSAPP_LANGUAGE_CODE:en_US}
    webhook:
      whatsapp:
        verify-token: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}

logging:
  charset:
    console: UTF-8
  level:
    com.springmsa.authserver: debug
    org.springframework.security: trace