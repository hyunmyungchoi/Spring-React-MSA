spring:
  config:
    activate:
      on-profile: prod

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - ${GATEWAY_CORS_ALLOWED_ORIGIN}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: bff-service
              uri: ${GATEWAY_BFF_URI}
              predicates:
                - Path=/bff/**

            - id: user-service
              uri: ${GATEWAY_USER_SERVICE_URI}
              predicates:
                - Path=/api/user/**

            - id: community-service
              uri: ${GATEWAY_COMMUNITY_SERVICE_URI}
              predicates:
                - Path=/api/community/**

            - id: stock-service
              uri: ${GATEWAY_STOCK_SERVICE_URI}
              predicates:
                - Path=/api/stock/**

            - id: authorization-server
              uri: ${GATEWAY_AUTHORIZATION_SERVER_URI}
              predicates:
                - Path=/oauth2/**,/.well-known/**,/userinfo,/login,/login/**,/logout,/webhooks/whatsapp,/connect/**
              filters:
                - PreserveHostHeader

logging:
  level:
    com.springmsa.gateway: info
    org.springframework.cloud.gateway: warn
