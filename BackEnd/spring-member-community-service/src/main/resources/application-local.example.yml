spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/msa}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:msa}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:msa}}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:16379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
          jwk-set-uri: http://localhost:9000/oauth2/jwks
