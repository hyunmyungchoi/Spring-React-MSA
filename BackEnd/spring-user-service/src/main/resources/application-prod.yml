spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED}
    default-schema: ${SPRING_FLYWAY_DEFAULT_SCHEMA}
    schemas: ${SPRING_FLYWAY_SCHEMAS}
    create-schemas: false
    clean-disabled: true

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}

logging:
  level:
    com.springmsa.userservice: info
    org.springframework.security: warn

springmsa:
  internal-api:
    token: ${SPRING_MSA_INTERNAL_API_TOKEN}
