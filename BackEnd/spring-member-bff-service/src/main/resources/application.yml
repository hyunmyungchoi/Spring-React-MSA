server:
  port: 8079
  servlet:
    session:
      cookie:
        name: BFFSESSIONID
        http-only: true
        same-site: lax

spring:
  application:
    name: spring-member-bff-service

  jpa:
    open-in-view: false

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.springmsa.kafka.event
    listener:
      ack-mode: record

  session:
    store-type: redis
    data:
      redis:
        namespace: spring:session:bff

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  charset:
    console: UTF-8
  level:
    com.springmsa.memberbff: debug

springmsa:
  internal-api:
    header-name: X-Internal-Token

bff:
  presence:
    redis:
      namespace: spring:presence:member-bff
    heartbeat:
      ttl-seconds: 45
    stream:
      key: spring:presence:member-bff:events
      max-length: 1000
  chat:
    pubsub:
      channel: spring:chat:broadcast
    cache:
      recent-messages:
        enabled: true
        namespace: spring:chat:cache
        max-size: 200
        ttl-seconds: 3600
    message:
      default-history-limit: 50
      max-content-length: 1000
  kafka:
    topics:
      partitions: 3
      replicas: 1
    retry:
      interval-ms: 1000
      max-attempts: 3
    consumer:
      notification-group: spring-member-bff-chat-notification
      analytics-group: spring-member-bff-chat-analytics
      dlt-group: spring-member-bff-chat-dlt
