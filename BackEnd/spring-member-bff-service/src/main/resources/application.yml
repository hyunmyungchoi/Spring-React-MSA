server:
  port: 8079
  servlet:
    session:
      cookie:
        name: BFFSESSIONID
        http-only: true
        same-site: lax

spring:
  application:
    name: spring-member-bff-service

  session:
    store-type: redis
    data:
      redis:
        namespace: spring:session:bff

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  charset:
    console: UTF-8
  level:
    com.springmsa.memberbff: debug

bff:
  presence:
    redis:
      namespace: ${BFF_PRESENCE_REDIS_NAMESPACE:spring:presence:member-bff}
    heartbeat:
      ttl-seconds: ${BFF_PRESENCE_HEARTBEAT_TTL_SECONDS:45}
    stream:
      key: ${BFF_PRESENCE_STREAM_KEY:spring:presence:member-bff:events}
      max-length: ${BFF_PRESENCE_STREAM_MAX_LENGTH:1000}
