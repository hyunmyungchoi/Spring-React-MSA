server:
  port: 8090

spring:
  application:
    name: spring-admin-gateway

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5176"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

          routes:
            - id: admin-bff-service
              uri: http://localhost:8087
              predicates:
                - Path=/admin-bff/**
              filters:
                - StripPrefix=1

            - id: authorization-server
              uri: http://localhost:9000
              predicates:
                - Path=/oauth2/**,/.well-known/**,/userinfo,/login,/login/**,/logout,/connect/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  charset:
    console: UTF-8
  level:
    com.springmsa.admingateway: debug
    org.springframework.cloud.gateway: debug