server:
  port: 8090

spring:
  application:
    name: spring-admin-gateway

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus

logging:
  charset:
    console: UTF-8
  level:
    com.springmsa.admingateway: debug
    org.springframework.cloud.gateway: debug
