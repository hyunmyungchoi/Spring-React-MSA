name: Build and Push Images to GHCR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Service or frontend entry to build and deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - spring-user-service
          - spring-member-community-service
          - spring-member-stock-service
          - spring-security-authorization-server
          - spring-member-bff-service
          - spring-admin-bff-service
          - spring-member-gateway
          - spring-admin-gateway
          - spring-member-web
          - spring-community-web
          - spring-stock-web
          - spring-admin-web
          - spring-admin-users-web
          - spring-admin-logs-web

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: hyunmyungchoi
  IMAGE_TAG: latest
  DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'all' }}

jobs:
  build-backend:
    name: Build backend images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - spring-member-gateway
          - spring-admin-gateway
          - spring-security-authorization-server
          - spring-user-service
          - spring-member-community-service
          - spring-member-stock-service
          - spring-member-bff-service
          - spring-admin-bff-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: (env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service) && matrix.service != 'spring-member-bff-service'
        uses: docker/build-push-action@v6
        with:
          context: BackEnd/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

      - name: Build and push member BFF Docker image
        if: (env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service) && matrix.service == 'spring-member-bff-service'
        uses: docker/build-push-action@v6
        with:
          context: BackEnd
          file: BackEnd/spring-member-bff-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

  build-frontend:
    name: Build frontend images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: spring-member-web
            dockerfile: FrontEnd/apps/member/Dockerfile
            vite_mode: prod
            web_mount_path: /
          - service: spring-community-web
            dockerfile: FrontEnd/apps/member/Dockerfile
            vite_mode: community
            web_mount_path: /community
          - service: spring-stock-web
            dockerfile: FrontEnd/apps/member/Dockerfile
            vite_mode: stock
            web_mount_path: /stock
          - service: spring-admin-web
            dockerfile: FrontEnd/apps/admin/Dockerfile
            vite_mode: prod
            web_mount_path: /
          - service: spring-admin-users-web
            dockerfile: FrontEnd/apps/admin/Dockerfile
            vite_mode: users
            web_mount_path: /manage/users
          - service: spring-admin-logs-web
            dockerfile: FrontEnd/apps/admin/Dockerfile
            vite_mode: logs
            web_mount_path: /manage/logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            VITE_MODE=${{ matrix.vite_mode }}
            WEB_MOUNT_PATH=${{ matrix.web_mount_path }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

  update-k8s-manifests:
    name: Update Kubernetes image tags
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update spring-msa image tags
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          sha = "${{ github.sha }}"
          target = "${{ env.DEPLOY_TARGET }}"
          manifest_dir = Path("infra/k8s/spring-msa")
          manifests = {
              "10-user-service.yaml": ["spring-user-service"],
              "11-community-service.yaml": ["spring-member-community-service"],
              "12-stock-service.yaml": ["spring-member-stock-service"],
              "13-auth-server.yaml": ["spring-security-authorization-server"],
              "20-member-bff-service.yaml": ["spring-member-bff-service"],
              "21-admin-bff-service.yaml": ["spring-admin-bff-service"],
              "30-member-gateway.yaml": ["spring-member-gateway"],
              "31-admin-gateway.yaml": ["spring-admin-gateway"],
              "40-web.yaml": [
                  "spring-member-web",
                  "spring-community-web",
                  "spring-stock-web",
                  "spring-admin-web",
                  "spring-admin-users-web",
                  "spring-admin-logs-web",
              ],
          }

          known_images = {image for images in manifests.values() for image in images}
          if target != "all" and target not in known_images:
              raise SystemExit(f"Unknown deploy target: {target}")

          updates = 0
          for file_name, image_names in manifests.items():
              selected_images = image_names if target == "all" else [target] if target in image_names else []
              if not selected_images:
                  continue

              path = manifest_dir / file_name
              text = path.read_text(encoding="utf-8")

              for image_name in selected_images:
                  pattern = rf"(- name:\s*{re.escape(image_name)}\n\s*image:\s*)[^\s]+"
                  replacement = rf"\g<1>ghcr.io/hyunmyungchoi/{image_name}:{sha}"
                  text, count = re.subn(pattern, replacement, text)

                  if count != 1:
                      raise SystemExit(f"Expected one image line for {image_name} in {path}, found {count}")

                  updates += count

              path.write_text(text, encoding="utf-8")

          if updates == 0:
              raise SystemExit(f"No Kubernetes image tag updates were made for target: {target}")
          PY

      - name: Verify fixed image tags
        shell: bash
        run: |
          if grep -R "image: ghcr.io/${IMAGE_OWNER}/.*:latest" infra/k8s/spring-msa; then
            echo "latest image tag remains in Kubernetes manifests"
            exit 1
          fi

      - name: Commit manifest tag update
        shell: bash
        run: |
          if git diff --quiet -- infra/k8s/spring-msa; then
            echo "No Kubernetes image tag changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/spring-msa
          git commit -m "chore(k8s): update ${DEPLOY_TARGET} image tag to ${GITHUB_SHA} [skip ci]"
          git push
