name: Build and Push Images to GHCR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Service or frontend entry to build and deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - spring-user-service
          - spring-member-community-service
          - spring-member-stock-service
          - spring-security-authorization-server
          - spring-member-bff-service
          - spring-admin-bff-service
          - spring-member-gateway
          - spring-admin-gateway
          - spring-member-web
          - spring-community-web
          - spring-stock-web
          - spring-admin-web
          - spring-admin-users-web
          - spring-admin-logs-web

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: hyunmyungchoi
  IMAGE_TAG: latest
  DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'all' }}

jobs:
  prepare-build-matrix:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      backend_matrix: ${{ steps.matrix.outputs.backend_matrix }}
      frontend_matrix: ${{ steps.matrix.outputs.frontend_matrix }}
      has_backend: ${{ steps.matrix.outputs.has_backend }}
      has_frontend: ${{ steps.matrix.outputs.has_frontend }}
      update_targets: ${{ steps.matrix.outputs.update_targets }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select deploy target
        id: matrix
        shell: bash
        run: |
          python infra/ci/select-build-matrix.py
        env:
          BEFORE_SHA: ${{ github.event.before }}

  build-backend:
    name: Build backend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
    if: needs.prepare-build-matrix.outputs.has_backend == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.backend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

  build-frontend:
    name: Build frontend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
    if: needs.prepare-build-matrix.outputs.has_frontend == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.frontend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

  update-k8s-manifests:
    name: Update Kubernetes image tags
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
      - build-backend
      - build-frontend
    env:
      UPDATE_TARGETS: ${{ needs.prepare-build-matrix.outputs.update_targets }}
    if: >
      ${{
        always()
        && github.actor != 'github-actions[bot]'
        && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        && needs.prepare-build-matrix.result == 'success'
        && (needs.prepare-build-matrix.outputs.has_backend == 'true' || needs.prepare-build-matrix.outputs.has_frontend == 'true')
        && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped')
        && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Update spring-msa image tags
        shell: bash
        run: |
          for target in ${UPDATE_TARGETS}; do
            python infra/ci/update-k8s-image-tags.py \
              --sha "${{ github.sha }}" \
              --target "${target}" \
              --manifest-dir infra/k8s/spring-msa \
              --registry "${{ env.REGISTRY }}" \
              --image-owner "${{ env.IMAGE_OWNER }}"
          done

      - name: Verify fixed image tags
        shell: bash
        run: |
          if grep -R "image: ghcr.io/${IMAGE_OWNER}/.*:latest" infra/k8s/spring-msa; then
            echo "latest image tag remains in Kubernetes manifests"
            exit 1
          fi

      - name: Commit manifest tag update
        shell: bash
        run: |
          if git diff --quiet -- infra/k8s/spring-msa; then
            echo "No Kubernetes image tag changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/spring-msa
          git commit -m "chore(k8s): update ${UPDATE_TARGETS} image tag to ${GITHUB_SHA} [skip ci]"
          git push
