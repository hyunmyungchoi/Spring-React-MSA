name: Build and Push Images to GHCR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Service or frontend entry to build and deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - spring-user-service
          - spring-member-community-service
          - spring-member-stock-service
          - spring-security-authorization-server
          - spring-member-bff-service
          - spring-admin-bff-service
          - spring-member-gateway
          - spring-admin-gateway
          - spring-member-web
          - spring-community-web
          - spring-stock-web
          - spring-admin-web
          - spring-admin-users-web
          - spring-admin-logs-web

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: hyunmyungchoi
  IMAGE_TAG: latest
  DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'all' }}

jobs:
  build-backend:
    name: Build backend images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: spring-member-gateway
            context: BackEnd/spring-member-gateway
            dockerfile: BackEnd/spring-member-gateway/Dockerfile
          - service: spring-admin-gateway
            context: BackEnd/spring-admin-gateway
            dockerfile: BackEnd/spring-admin-gateway/Dockerfile
          - service: spring-security-authorization-server
            context: BackEnd
            dockerfile: BackEnd/spring-security-authorization-server/Dockerfile
          - service: spring-user-service
            context: BackEnd
            dockerfile: BackEnd/spring-user-service/Dockerfile
          - service: spring-member-community-service
            context: BackEnd/spring-member-community-service
            dockerfile: BackEnd/spring-member-community-service/Dockerfile
          - service: spring-member-stock-service
            context: BackEnd/spring-member-stock-service
            dockerfile: BackEnd/spring-member-stock-service/Dockerfile
          - service: spring-member-bff-service
            context: BackEnd
            dockerfile: BackEnd/spring-member-bff-service/Dockerfile
          - service: spring-admin-bff-service
            context: BackEnd
            dockerfile: BackEnd/spring-admin-bff-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

  build-frontend:
    name: Build frontend images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: spring-member-web
            dockerfile: FrontEnd/apps/member/Dockerfile.member
          - service: spring-community-web
            dockerfile: FrontEnd/apps/member/Dockerfile.community
          - service: spring-stock-web
            dockerfile: FrontEnd/apps/member/Dockerfile.stock
          - service: spring-admin-web
            dockerfile: FrontEnd/apps/admin/Dockerfile.admin
          - service: spring-admin-users-web
            dockerfile: FrontEnd/apps/admin/Dockerfile.users
          - service: spring-admin-logs-web
            dockerfile: FrontEnd/apps/admin/Dockerfile.logs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: env.DEPLOY_TARGET == 'all' || env.DEPLOY_TARGET == matrix.service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

  update-k8s-manifests:
    name: Update Kubernetes image tags
    runs-on: ubuntu-latest
    needs:
      - build-backend
      - build-frontend
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update spring-msa image tags
        shell: bash
        run: |
          python infra/ci/update-k8s-image-tags.py \
            --sha "${{ github.sha }}" \
            --target "${{ env.DEPLOY_TARGET }}" \
            --manifest-dir infra/k8s/spring-msa \
            --registry "${{ env.REGISTRY }}" \
            --image-owner "${{ env.IMAGE_OWNER }}"

      - name: Verify fixed image tags
        shell: bash
        run: |
          if grep -R "image: ghcr.io/${IMAGE_OWNER}/.*:latest" infra/k8s/spring-msa; then
            echo "latest image tag remains in Kubernetes manifests"
            exit 1
          fi

      - name: Commit manifest tag update
        shell: bash
        run: |
          if git diff --quiet -- infra/k8s/spring-msa; then
            echo "No Kubernetes image tag changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/spring-msa
          git commit -m "chore(k8s): update ${DEPLOY_TARGET} image tag to ${GITHUB_SHA} [skip ci]"
          git push
