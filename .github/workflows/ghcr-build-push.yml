name: Build and Push Images to GHCR

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Service or frontend entry to build and deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - all-backend
          - database-migrations
          - spring-user-service
          - spring-member-community-service
          - spring-member-stock-service
          - spring-security-authorization-server
          - spring-member-bff-service
          - spring-admin-bff-service
          - spring-member-gateway
          - spring-admin-gateway
          - spring-member-web
          - spring-community-web
          - spring-stock-web
          - spring-admin-web
          - spring-admin-users-web
          - spring-admin-logs-web

permissions:
  contents: write
  packages: write

concurrency:
  group: ghcr-publish-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: hyunmyungchoi
  IMAGE_TAG: latest
  CRANE_VERSION: v0.21.7
  DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'all' }}

jobs:
  prepare-build-matrix:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      backend_matrix: ${{ steps.matrix.outputs.backend_matrix }}
      frontend_matrix: ${{ steps.matrix.outputs.frontend_matrix }}
      has_backend: ${{ steps.matrix.outputs.has_backend }}
      has_frontend: ${{ steps.matrix.outputs.has_frontend }}
      update_targets: ${{ steps.matrix.outputs.update_targets }}
      selected_images: ${{ steps.matrix.outputs.selected_images }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select deploy target
        id: matrix
        shell: bash
        run: |
          python infra/ci/select-build-matrix.py
        env:
          BEFORE_SHA: ${{ github.event.before }}

  ci-matrix-test:
    name: CI matrix unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run CI matrix tests
        run: python -m unittest infra/ci/test_select_build_matrix.py

  test-backend:
    name: Test backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
    if: needs.prepare-build-matrix.outputs.has_backend == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.backend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        working-directory: BackEnd/${{ matrix.service }}
        run: chmod +x ./gradlew

      - name: Run Gradle tests
        working-directory: BackEnd/${{ matrix.service }}
        run: ./gradlew test

  verify-frontend:
    name: Verify frontend (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
    if: needs.prepare-build-matrix.outputs.has_frontend == 'true'

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.frontend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24.18.0'

      - name: Install, lint, and build
        shell: bash
        run: |
          case "${{ matrix.service }}" in
            spring-admin-*) app_name="admin" ;;
            *) app_name="member" ;;
          esac

          corepack enable
          cd FrontEnd
          corepack install
          test "$(pnpm --version)" = "10.0.0"
          pnpm install --frozen-lockfile
          pnpm --filter "${app_name}" run lint
          pnpm --filter "${app_name}" run build:all

  build-backend:
    name: Build backend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
      - test-backend
      - ci-matrix-test
    if: >-
      ${{
        needs.prepare-build-matrix.outputs.has_backend == 'true'
        && needs.test-backend.result == 'success'
        && needs.ci-matrix-test.result == 'success'
      }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.backend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.7
        with:
          version: ${{ env.CRANE_VERSION }}

      - name: Check immutable GHCR image
        id: existing
        shell: bash
        run: >-
          python infra/ci/registry_image_integrity.py inspect
          --image "${REGISTRY}/${IMAGE_OWNER}/${{ matrix.service }}:${GITHUB_SHA}"
          --allow-missing
          --github-output "${GITHUB_OUTPUT}"

      - name: Build and push immutable SHA image
        id: build
        if: steps.existing.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

      - name: Verify immutable digest and update convenience tag
        id: image
        shell: bash
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          image="${REGISTRY}/${IMAGE_OWNER}/${{ matrix.service }}"
          python infra/ci/registry_image_integrity.py inspect \
            --image "${image}:${GITHUB_SHA}" \
            --github-output "${GITHUB_OUTPUT}"

          resolved_digest="$(crane digest "${image}:${GITHUB_SHA}")"
          if [[ -n "${BUILD_DIGEST}" && "${BUILD_DIGEST}" != "${resolved_digest}" ]]; then
            echo "Build output digest does not match the digest stored in GHCR."
            exit 1
          fi

          crane tag "${image}@${resolved_digest}" "${IMAGE_TAG}"

  build-frontend:
    name: Build frontend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
      - verify-frontend
      - ci-matrix-test
    if: >-
      ${{
        needs.prepare-build-matrix.outputs.has_frontend == 'true'
        && needs.verify-frontend.result == 'success'
        && needs.ci-matrix-test.result == 'success'
      }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.frontend_matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.7
        with:
          version: ${{ env.CRANE_VERSION }}

      - name: Check immutable GHCR image
        id: existing
        shell: bash
        run: >-
          python infra/ci/registry_image_integrity.py inspect
          --image "${REGISTRY}/${IMAGE_OWNER}/${{ matrix.service }}:${GITHUB_SHA}"
          --allow-missing
          --github-output "${GITHUB_OUTPUT}"

      - name: Build and push immutable SHA image
        id: build
        if: steps.existing.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

      - name: Verify immutable digest and update convenience tag
        id: image
        shell: bash
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          image="${REGISTRY}/${IMAGE_OWNER}/${{ matrix.service }}"
          python infra/ci/registry_image_integrity.py inspect \
            --image "${image}:${GITHUB_SHA}" \
            --github-output "${GITHUB_OUTPUT}"

          resolved_digest="$(crane digest "${image}:${GITHUB_SHA}")"
          if [[ -n "${BUILD_DIGEST}" && "${BUILD_DIGEST}" != "${resolved_digest}" ]]; then
            echo "Build output digest does not match the digest stored in GHCR."
            exit 1
          fi

          crane tag "${image}@${resolved_digest}" "${IMAGE_TAG}"

  update-k8s-manifests:
    name: Update Kubernetes image tags
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
      - build-backend
      - build-frontend
    env:
      UPDATE_TARGETS: ${{ needs.prepare-build-matrix.outputs.update_targets }}
      SELECTED_IMAGES: ${{ needs.prepare-build-matrix.outputs.selected_images }}
    if: >-
      ${{
        always()
        && github.actor != 'github-actions[bot]'
        && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        && needs.prepare-build-matrix.result == 'success'
        && (needs.prepare-build-matrix.outputs.has_backend == 'true' || needs.prepare-build-matrix.outputs.has_frontend == 'true')
        && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped')
        && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.7
        with:
          version: ${{ env.CRANE_VERSION }}

      - name: Update spring-msa image digests
        shell: bash
        run: |
          for target in ${SELECTED_IMAGES}; do
            digest="$(crane digest "${REGISTRY}/${IMAGE_OWNER}/${target}:${GITHUB_SHA}")"
            python infra/ci/update-k8s-image-tags.py \
              --digest "${digest}" \
              --target "${target}" \
              --manifest-dir infra/k8s/spring-msa \
              --registry "${{ env.REGISTRY }}" \
              --image-owner "${{ env.IMAGE_OWNER }}"
          done

      - name: Verify digest-pinned image references
        shell: bash
        run: |
          if grep -R "image: ghcr.io/${IMAGE_OWNER}/.*:latest" infra/k8s/spring-msa; then
            echo "latest image tag remains in Kubernetes manifests"
            exit 1
          fi

          for target in ${SELECTED_IMAGES}; do
            if ! grep -R -A1 -- "- name: ${target}" infra/k8s/spring-msa \
              | grep -Eq "image: ghcr.io/${IMAGE_OWNER}/${target}@sha256:[0-9a-f]{64}"; then
              echo "${target} is not pinned to a GHCR digest in the Kubernetes manifests"
              exit 1
            fi
          done

      - name: Commit manifest tag update
        shell: bash
        run: |
          if git diff --quiet -- infra/k8s/spring-msa; then
            echo "No Kubernetes image tag changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/spring-msa
          git commit -m "chore(k8s): pin ${UPDATE_TARGETS} image digest for ${GITHUB_SHA} [skip ci]"
          git push
