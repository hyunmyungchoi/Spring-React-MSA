name: Verify

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      deploy_target:
        description: Service or frontend entry to verify
        required: true
        default: all
        type: choice
        options:
          - all
          - spring-user-service
          - spring-member-community-service
          - spring-member-stock-service
          - spring-security-authorization-server
          - spring-member-bff-service
          - spring-admin-bff-service
          - spring-member-gateway
          - spring-admin-gateway
          - spring-member-web
          - spring-community-web
          - spring-stock-web
          - spring-admin-web
          - spring-admin-users-web
          - spring-admin-logs-web

permissions:
  contents: read

env:
  DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'all' }}

jobs:
  prepare-build-matrix:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      backend_matrix: ${{ steps.matrix.outputs.backend_matrix }}
      frontend_matrix: ${{ steps.matrix.outputs.frontend_matrix }}
      has_backend: ${{ steps.matrix.outputs.has_backend }}
      has_frontend: ${{ steps.matrix.outputs.has_frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Select verify target
        id: matrix
        shell: bash
        run: python infra/ci/select-build-matrix.py
        env:
          BEFORE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}

  ci-matrix-test:
    name: CI matrix unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run CI matrix tests
        run: >-
          python -m unittest
          infra/ci/test_select_build_matrix.py
          infra/ci/test_select_frontend_deploy_matrix.py
          infra/ci/test_aws_frontend_deploy_workflow.py

  backend-test:
    name: Backend test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
    if: needs.prepare-build-matrix.outputs.has_backend == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.backend_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        working-directory: BackEnd/${{ matrix.service }}
        run: chmod +x ./gradlew

      - name: Run Gradle tests
        working-directory: BackEnd/${{ matrix.service }}
        run: ./gradlew test

  frontend-verify:
    name: Frontend lint/build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
    if: needs.prepare-build-matrix.outputs.has_frontend == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.frontend_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24.18.0'

      - name: Install, lint, and build
        shell: bash
        run: |
          case "${{ matrix.service }}" in
            spring-admin-*) app_name="admin" ;;
            *) app_name="member" ;;
          esac

          corepack enable
          cd FrontEnd
          corepack install
          test "$(pnpm --version)" = "10.0.0"
          pnpm install --frozen-lockfile
          pnpm --filter "${app_name}" run lint
          pnpm --filter "${app_name}" run build:all

  backend-docker-build:
    name: Backend Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
      - backend-test
      - ci-matrix-test
    if: >-
      ${{
        needs.prepare-build-matrix.outputs.has_backend == 'true'
        && needs.backend-test.result == 'success'
        && needs.ci-matrix-test.result == 'success'
      }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.backend_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false

  frontend-docker-build:
    name: Frontend Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
      - frontend-verify
      - ci-matrix-test
    if: >-
      ${{
        needs.prepare-build-matrix.outputs.has_frontend == 'true'
        && needs.frontend-verify.result == 'success'
        && needs.ci-matrix-test.result == 'success'
      }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.frontend_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
