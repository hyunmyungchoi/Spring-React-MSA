name: Promote Backend Images from GHCR to Amazon ECR

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full 40-character Git SHA already published to GHCR
        required: true
        type: string
      deploy_target:
        description: Backend service image to promote without rebuilding
        required: true
        default: database-migrations
        type: choice
        options:
          - database-migrations
          - all
          - spring-member-gateway
          - spring-admin-gateway
          - spring-security-authorization-server
          - spring-user-service
          - spring-member-community-service
          - spring-member-stock-service
          - spring-member-bff-service
          - spring-admin-bff-service

permissions:
  contents: read

concurrency:
  group: ecr-promote-${{ inputs.source_sha }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  ECR_NAMESPACE: spring-react-msa-learning
  GHCR_REGISTRY: ghcr.io
  GHCR_OWNER: hyunmyungchoi
  CRANE_VERSION: v0.21.7
  SOURCE_SHA: ${{ inputs.source_sha }}
  DEPLOY_TARGET: ${{ inputs.deploy_target }}

jobs:
  prepare-build-matrix:
    name: Prepare backend promotion matrix
    runs-on: ubuntu-latest
    outputs:
      backend_matrix: ${{ steps.matrix.outputs.backend_matrix }}
      has_backend: ${{ steps.matrix.outputs.has_backend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate backend target
        shell: bash
        run: |
          case "${DEPLOY_TARGET}" in
            database-migrations|all|spring-member-gateway|spring-admin-gateway|spring-security-authorization-server|spring-user-service|spring-member-community-service|spring-member-stock-service|spring-member-bff-service|spring-admin-bff-service)
              ;;
            *)
              echo "Unsupported ECR promotion target: ${DEPLOY_TARGET}"
              exit 1
              ;;
          esac

      - name: Select backend target
        id: matrix
        run: python infra/ci/select-build-matrix.py

  ci-image-integrity-test:
    name: CI image integrity tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run matrix and registry integrity tests
        run: >-
          python -m unittest
          infra/ci/test_select_build_matrix.py
          infra/ci/test_update_k8s_image_tags.py
          infra/ci/test_registry_image_integrity.py
          infra/ci/test_ecr_build_push_workflow.py

  promote-backend:
    name: Promote backend image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - prepare-build-matrix
      - ci-image-integrity-test
    if: >-
      ${{
        needs.prepare-build-matrix.outputs.has_backend == 'true'
        && needs.ci-image-integrity-test.result == 'success'
      }}

    permissions:
      contents: read
      packages: read
      id-token: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-build-matrix.outputs.backend_matrix) }}

    env:
      AWS_ECR_PUSH_ROLE_ARN: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}

    steps:
      - name: Checkout trusted master workflow
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate promotion prerequisites
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/master" ]]; then
            echo "ECR promotion is restricted to refs/heads/master; received ${GITHUB_REF}."
            exit 1
          fi

          if [[ ! "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_sha must be a full lowercase 40-character Git SHA."
            exit 1
          fi

          if [[ -z "${AWS_ECR_PUSH_ROLE_ARN}" ]]; then
            echo "Repository variable AWS_ECR_PUSH_ROLE_ARN is required."
            exit 1
          fi

          git cat-file -e "${SOURCE_SHA}^{commit}"
          if ! git merge-base --is-ancestor "${SOURCE_SHA}" "origin/master"; then
            echo "source_sha must be reachable from origin/master."
            exit 1
          fi

      - name: Install crane
        uses: imjasonh/setup-crane@v0.7
        with:
          version: ${{ env.CRANE_VERSION }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActionsEcrPromote-${{ github.run_id }}
          role-duration-seconds: 3600

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Promote immutable image without rebuilding
        id: promotion
        shell: bash
        run: >-
          python infra/ci/registry_image_integrity.py promote
          --source "${GHCR_REGISTRY}/${GHCR_OWNER}/${{ matrix.service }}:${SOURCE_SHA}"
          --destination "${{ steps.login-ecr.outputs.registry }}/${ECR_NAMESPACE}/${{ matrix.service }}:${SOURCE_SHA}"
          --github-output "${GITHUB_OUTPUT}"

      - name: Record verified promotion
        shell: bash
        run: |
          {
            echo "### ${{ matrix.service }}"
            echo "- Result: ${{ steps.promotion.outputs.action }}"
            echo "- Source SHA: ${SOURCE_SHA}"
            echo "- GHCR digest: ${{ steps.promotion.outputs.source_digest }}"
            echo "- ECR digest: ${{ steps.promotion.outputs.destination_digest }}"
            echo "- Immutable ECR image: ${{ steps.promotion.outputs.destination_image }}"
          } >> "${GITHUB_STEP_SUMMARY}"
