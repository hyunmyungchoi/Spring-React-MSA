apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-react-msa-config
  namespace: spring-react-msa
data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: msa

  REDIS_HOST: redis
  REDIS_PORT: "6379"

  AUTHORIZATION_SERVER_URL: http://authorization-server:9000
  GATEWAY_URL: http://gateway:8080
  BFF_URL: http://bff:8079
  USER_SERVICE_URL: http://user-service:8081