apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-member-bff-service
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-member-bff-service
  template:
    metadata:
      labels:
        app: spring-member-bff-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spring-member-bff-service
          image: ghcr.io/hyunmyungchoi/spring-member-bff-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8079
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
              value: "true"
            - name: SERVER_TOMCAT_ACCESSLOG_DIRECTORY
              value: /dev
            - name: SERVER_TOMCAT_ACCESSLOG_PREFIX
              value: stdout
            - name: SERVER_TOMCAT_ACCESSLOG_SUFFIX
              value: ""
            - name: SERVER_TOMCAT_ACCESSLOG_FILE_DATE_FORMAT
              value: ""
            - name: SERVER_TOMCAT_ACCESSLOG_BUFFERED
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/msa
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: spring-msa-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: REDIS_PASSWORD
            - name: BFF_FRONTEND_REDIRECT_URI
              value: http://user.localtest.me
            - name: BFF_OAUTH2_AUTHORIZATION_URI
              value: http://user.localtest.me/oauth2/authorize
            - name: BFF_OAUTH2_TOKEN_URI
              value: http://spring-member-gateway:8080/oauth2/token
            - name: BFF_OAUTH2_USERINFO_URI
              value: http://spring-member-gateway:8080/userinfo
            - name: BFF_OAUTH2_JWK_SET_URI
              value: http://spring-security-authorization-server:9000/oauth2/jwks
            - name: BFF_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: spring-msa-oauth-secret
                  key: BFF_CLIENT_ID
            - name: BFF_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: spring-msa-oauth-secret
                  key: BFF_CLIENT_SECRET
            - name: BFF_OAUTH2_REDIRECT_URI
              value: http://user.localtest.me/bff/login/oauth2/code/member-bff
            - name: BFF_OAUTH2_END_SESSION_URI
              value: http://user.localtest.me/connect/logout
            - name: BFF_OAUTH2_LOGOUT_URI
              value: http://user.localtest.me/logout
            - name: BFF_OAUTH2_SCOPE
              value: openid profile
            - name: BFF_API_COMMUNITY_ME_URI
              value: http://spring-member-gateway:8080/api/community/me
            - name: BFF_API_USER_ME_URI
              value: http://spring-member-gateway:8080/api/user/me
            - name: BFF_API_USER_SIGNUP_URI
              value: http://spring-user-service:8081/internal/users
            - name: BFF_API_STOCK_ME_URI
              value: http://spring-member-gateway:8080/api/stock/me
            - name: BFF_API_USER_API_BASE_URL
              value: http://spring-user-service:8081
            - name: BFF_API_USER_INTERNAL_BASE_URL
              value: http://spring-user-service:8081
            - name: BFF_API_COMMUNITY_API_BASE_URL
              value: http://spring-member-community-service:8083
            - name: BFF_API_STOCK_API_BASE_URL
              value: http://spring-member-stock-service:8084
---
apiVersion: v1
kind: Service
metadata:
  name: spring-member-bff-service
  namespace: spring-msa
spec:
  type: ClusterIP
  selector:
    app: spring-member-bff-service
  ports:
    - port: 8079
      targetPort: 8079

