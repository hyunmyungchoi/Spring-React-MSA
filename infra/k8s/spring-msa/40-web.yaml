apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-member-web
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-member-web
  template:
    metadata:
      labels:
        app: spring-member-web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spring-member-web
          image: ghcr.io/hyunmyungchoi/spring-member-web:2b2ca329c24136c11cd668bc514f906a4b116e8f
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: spring-member-web
  namespace: spring-msa
spec:
  type: ClusterIP
  selector:
    app: spring-member-web
  ports:
    - port: 80
      targetPort: 80
---
