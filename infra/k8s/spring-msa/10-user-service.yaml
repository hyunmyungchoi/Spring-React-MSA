apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-user-service
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-user-service
  template:
    metadata:
      labels:
        app: spring-user-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spring-user-service
          image: ghcr.io/hyunmyungchoi/spring-user-service@sha256:a043657a6cfc30927b9a52a6949b2ed004905eb28567e2ce4ea2b076da3e0310
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30"
            - name: SERVER_TOMCAT_ACCESSLOG_ENABLED
              value: "true"
            - name: SERVER_TOMCAT_ACCESSLOG_DIRECTORY
              value: /dev
            - name: SERVER_TOMCAT_ACCESSLOG_PREFIX
              value: stdout
            - name: SERVER_TOMCAT_ACCESSLOG_SUFFIX
              value: ""
            - name: SERVER_TOMCAT_ACCESSLOG_FILE_DATE_FORMAT
              value: ""
            - name: SERVER_TOMCAT_ACCESSLOG_BUFFERED
              value: "false"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/msa
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: spring-msa-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_MSA_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: SPRING_MSA_INTERNAL_API_TOKEN
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: http://user.localtest.me
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: http://spring-security-authorization-server:9000/oauth2/jwks
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: validate
            - name: SPRING_SQL_INIT_MODE
              value: never
            - name: SPRING_FLYWAY_ENABLED
              value: "false"
            - name: SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA
              value: public
            - name: SPRING_FLYWAY_DEFAULT_SCHEMA
              value: public
            - name: SPRING_FLYWAY_SCHEMAS
              value: public
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 512m
              memory: 768Mi
            limits:
              cpu: 512m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: spring-user-service
  namespace: spring-msa
spec:
  type: ClusterIP
  selector:
    app: spring-user-service
  ports:
    - port: 8081
      targetPort: 8081

