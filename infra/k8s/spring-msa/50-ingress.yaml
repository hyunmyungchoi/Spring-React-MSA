                  number: 8090
          - path: /login
            pathType: Prefix
            backend:
              service:
                name: spring-admin-gateway
                port:
                  number: 8090
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: spring-admin-gateway
                port:
                  number: 8090
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: spring-admin-gateway
                port:
                  number: 8090
          - path: /logout
            pathType: Prefix
            backend:
              service:
                name: spring-admin-gateway
                port:
                  number: 8090
          - path: /connect
            pathType: Prefix
            backend:
              service:
                name: spring-admin-gateway
                port:
                  number: 8090
          - path: /userinfo
            pathType: Prefix
            backend:
              service:
                name: spring-admin-gateway
                port:
                  number: 8090
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-admin-web
                port:
                  number: 80
