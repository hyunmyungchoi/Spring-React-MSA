apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-member-gateway
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-member-gateway
  template:
    metadata:
      labels:
        app: spring-member-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spring-member-gateway
          image: ghcr.io/hyunmyungchoi/spring-member-gateway@sha256:ba7b01a403e97c3c3cafd1f2c8e9982d5cd2ca9a3e4a76218996565e05420e71
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=70 -XX:InitialRAMPercentage=30"
            - name: JAVA_OPTS
              value: -Dreactor.netty.http.server.accessLogEnabled=true
            - name: GATEWAY_CORS_ALLOWED_ORIGIN
              value: http://user.localtest.me
            - name: GATEWAY_BFF_URI
              value: http://spring-member-bff-service:8079
            - name: GATEWAY_BFF_WEBSOCKET_URI
              value: ws://spring-member-bff-service:8079
            - name: GATEWAY_USER_SERVICE_URI
              value: http://spring-user-service:8081
            - name: GATEWAY_COMMUNITY_SERVICE_URI
              value: http://spring-member-community-service:8083
            - name: GATEWAY_STOCK_SERVICE_URI
              value: http://spring-member-stock-service:8084
            - name: GATEWAY_AUTHORIZATION_SERVER_URI
              value: http://spring-security-authorization-server:9000
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: 256m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: spring-member-gateway
  namespace: spring-msa
spec:
  type: ClusterIP
  selector:
    app: spring-member-gateway
  ports:
    - port: 8080
      targetPort: 8080
