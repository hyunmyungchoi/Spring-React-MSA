apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-msa-config
  namespace: spring-msa
data:
  POSTGRES_DB: msa
  POSTGRES_USER: msa
  PUBLIC_GATEWAY_URL: http://localhost:8080
  SHELL_FRONTEND_URL: http://localhost:5173

---
apiVersion: v1
kind: Secret
metadata:
  name: spring-msa-secret
  namespace: spring-msa
type: Opaque
stringData:
  POSTGRES_PASSWORD: msa-prod-test-password
  REDIS_PASSWORD: redis-prod-test-password

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: spring-msa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: spring-msa-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: spring-msa-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: spring-msa
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: REDIS_PASSWORD

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: spring-msa
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-user-service
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-user-service
  template:
    metadata:
      labels:
        app: spring-user-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spring-user-service
          image: ghcr.io/hyunmyungchoi/spring-user-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/msa
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: spring-msa-config
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: POSTGRES_PASSWORD
            - name: SPRING_DATA_REDIS_HOST
              value: redis
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spring-msa-secret
                  key: REDIS_PASSWORD
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: http://localhost:8080
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: update

---
apiVersion: v1
kind: Service
metadata:
  name: spring-user-service
  namespace: spring-msa
spec:
  selector:
    app: spring-user-service
  ports:
    - port: 8081
      targetPort: 8081

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-cloud-gateway
  namespace: spring-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-cloud-gateway
  template:
    metadata:
      labels:
        app: spring-cloud-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spring-cloud-gateway
          image: ghcr.io/hyunmyungchoi/spring-cloud-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: GATEWAY_CORS_ALLOWED_ORIGIN
              value: http://localhost:5173
            - name: GATEWAY_BFF_URI
              value: http://spring-bff-service:8079
            - name: GATEWAY_USER_SERVICE_URI
              value: http://spring-user-service:8081
            - name: GATEWAY_COMMUNITY_SERVICE_URI
              value: http://spring-community-service:8083
            - name: GATEWAY_STOCK_SERVICE_URI
              value: http://spring-stock-service:8084
            - name: GATEWAY_AUTHORIZATION_SERVER_URI
              value: http://spring-security-authorization-server:9000

---
apiVersion: v1
kind: Service
metadata:
  name: spring-cloud-gateway
  namespace: spring-msa
spec:
  selector:
    app: spring-cloud-gateway
  ports:
    - port: 8080
      targetPort: 8080