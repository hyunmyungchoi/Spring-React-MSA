apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spring-msa
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hyunmyungchoi/Spring-React-MSA.git
    targetRevision: master
    path: infra/k8s/spring-msa
  destination:
    server: https://kubernetes.default.svc
    namespace: spring-msa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
