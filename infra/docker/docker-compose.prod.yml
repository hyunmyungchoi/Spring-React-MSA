services:
  postgres:
    image: postgres:16
    container_name: spring-msa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - spring-msa-postgres-data:/var/lib/postgresql/data
    networks:
      - spring-msa-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: spring-msa-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-user-service:
    image: ${IMAGE_REGISTRY}/spring-user-service:${IMAGE_TAG}
    container_name: spring-user-service
    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${PUBLIC_GATEWAY_URL}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://spring-security-authorization-server:9000/oauth2/jwks
    depends_on:
      - postgres
      - redis
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-member-community-service:
    image: ${IMAGE_REGISTRY}/spring-member-community-service:${IMAGE_TAG}
    container_name: spring-member-community-service
    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${PUBLIC_GATEWAY_URL}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://spring-security-authorization-server:9000/oauth2/jwks
    depends_on:
      - postgres
      - redis
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-member-stock-service:
    image: ${IMAGE_REGISTRY}/spring-member-stock-service:${IMAGE_TAG}
    container_name: spring-member-stock-service
    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${PUBLIC_GATEWAY_URL}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://spring-security-authorization-server:9000/oauth2/jwks
    depends_on:
      - postgres
      - redis
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-security-authorization-server:
    image: ${IMAGE_REGISTRY}/spring-security-authorization-server:${IMAGE_TAG}
    container_name: spring-security-authorization-server
    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      AUTH_SERVER_ISSUER: ${PUBLIC_GATEWAY_URL}
      USER_SERVICE_BASE_URL: http://spring-user-service:8081
      USER_FRONTEND_LOGIN_URI: ${MEMBER_FRONTEND_URL}/auth
      ADMIN_FRONTEND_LOGIN_URI: ${ADMIN_PUBLIC_ORIGIN}/auth

      BFF_CLIENT_ID: ${BFF_CLIENT_ID}
      BFF_CLIENT_SECRET_HASH: ${BFF_CLIENT_SECRET_HASH}
      BFF_OAUTH2_REDIRECT_URI: ${MEMBER_FRONTEND_URL}/bff/login/oauth2/code/member-bff
      BFF_POST_LOGOUT_REDIRECT_URI: ${MEMBER_FRONTEND_URL}/auth

      ADMIN_BFF_CLIENT_ID: ${ADMIN_BFF_CLIENT_ID}
      ADMIN_BFF_CLIENT_SECRET_HASH: ${ADMIN_BFF_CLIENT_SECRET_HASH}
      ADMIN_BFF_OAUTH2_REDIRECT_URI: ${ADMIN_PUBLIC_ORIGIN}/admin-bff/login/oauth2/code/admin-bff
      ADMIN_BFF_POST_LOGOUT_REDIRECT_URI: ${ADMIN_PUBLIC_ORIGIN}
      ADMIN_BFF_POST_LOGOUT_LOGIN_REDIRECT_URI: ${ADMIN_PUBLIC_ORIGIN}/auth
    depends_on:
      - redis
      - spring-user-service
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-member-bff-service:
    image: ${IMAGE_REGISTRY}/spring-member-bff-service:${IMAGE_TAG}
    container_name: spring-member-bff-service
    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      BFF_FRONTEND_REDIRECT_URI: ${MEMBER_FRONTEND_URL}

      BFF_OAUTH2_AUTHORIZATION_URI: ${MEMBER_FRONTEND_URL}/oauth2/authorize
      BFF_OAUTH2_TOKEN_URI: http://spring-member-gateway:8080/oauth2/token
      BFF_OAUTH2_USERINFO_URI: http://spring-member-gateway:8080/userinfo
      BFF_OAUTH2_JWK_SET_URI: http://spring-member-gateway:8080/oauth2/jwks
      BFF_CLIENT_ID: ${BFF_CLIENT_ID}
      BFF_CLIENT_SECRET: ${BFF_CLIENT_SECRET}
      BFF_OAUTH2_REDIRECT_URI: ${MEMBER_FRONTEND_URL}/bff/login/oauth2/code/member-bff
      BFF_OAUTH2_END_SESSION_URI: ${MEMBER_FRONTEND_URL}/connect/logout
      BFF_OAUTH2_LOGOUT_URI: ${MEMBER_FRONTEND_URL}/logout

      BFF_API_USER_API_BASE_URL: http://spring-user-service:8081
      BFF_API_USER_INTERNAL_BASE_URL: http://spring-user-service:8081
      BFF_API_COMMUNITY_API_BASE_URL: http://spring-member-community-service:8083
      BFF_API_STOCK_API_BASE_URL: http://spring-member-stock-service:8084
    depends_on:
      - redis
      - spring-security-authorization-server
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-admin-bff-service:
    image: ${IMAGE_REGISTRY}/spring-admin-bff-service:${IMAGE_TAG}
    container_name: spring-admin-bff-service
    environment:
      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}

      ADMIN_BFF_FRONTEND_REDIRECT_URI: ${ADMIN_PUBLIC_ORIGIN}

      ADMIN_BFF_OAUTH2_AUTHORIZATION_URI: ${ADMIN_PUBLIC_ORIGIN}/oauth2/authorize
      ADMIN_BFF_OAUTH2_TOKEN_URI: http://spring-admin-gateway:8090/oauth2/token
      ADMIN_BFF_OAUTH2_USERINFO_URI: http://spring-admin-gateway:8090/userinfo
      ADMIN_BFF_OAUTH2_JWK_SET_URI: http://spring-admin-gateway:8090/oauth2/jwks
      ADMIN_BFF_CLIENT_ID: ${ADMIN_BFF_CLIENT_ID}
      ADMIN_BFF_CLIENT_SECRET: ${ADMIN_BFF_CLIENT_SECRET}
      ADMIN_BFF_OAUTH2_REDIRECT_URI: ${ADMIN_PUBLIC_ORIGIN}/admin-bff/login/oauth2/code/admin-bff
      ADMIN_BFF_OAUTH2_END_SESSION_URI: ${ADMIN_PUBLIC_ORIGIN}/connect/logout
      ADMIN_BFF_OAUTH2_LOGOUT_URI: ${ADMIN_PUBLIC_ORIGIN}/logout

      ADMIN_BFF_API_USER_API_BASE_URL: http://spring-member-gateway:8080
      ADMIN_BFF_API_USER_INTERNAL_BASE_URL: http://spring-user-service:8081
    depends_on:
      - redis
      - spring-security-authorization-server
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-member-gateway:
    image: ${IMAGE_REGISTRY}/spring-member-gateway:${IMAGE_TAG}
    container_name: spring-member-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod

      GATEWAY_CORS_ALLOWED_ORIGIN: ${MEMBER_FRONTEND_URL}

      GATEWAY_BFF_URI: http://spring-member-bff-service:8079
      GATEWAY_USER_SERVICE_URI: http://spring-user-service:8081
      GATEWAY_COMMUNITY_SERVICE_URI: http://spring-member-community-service:8083
      GATEWAY_STOCK_SERVICE_URI: http://spring-member-stock-service:8084
      GATEWAY_AUTHORIZATION_SERVER_URI: http://spring-security-authorization-server:9000
    ports:
      - "8080:8080"
    depends_on:
      - spring-member-bff-service
      - spring-user-service
      - spring-member-community-service
      - spring-member-stock-service
      - spring-security-authorization-server
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-admin-gateway:
    image: ${IMAGE_REGISTRY}/spring-admin-gateway:${IMAGE_TAG}
    container_name: spring-admin-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod

      ADMIN_GATEWAY_CORS_ALLOWED_ORIGIN: ${ADMIN_PUBLIC_ORIGIN}

      ADMIN_GATEWAY_ADMIN_BFF_URI: http://spring-admin-bff-service:8087
      ADMIN_GATEWAY_AUTHORIZATION_SERVER_URI: http://spring-security-authorization-server:9000
    ports:
      - "8090:8090"
    depends_on:
      - spring-admin-bff-service
      - spring-security-authorization-server
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-member-web:
    image: ${IMAGE_REGISTRY:-ghcr.io/hyunmyungchoi}/spring-member-web:${IMAGE_TAG:-latest}
    container_name: spring-member-web
    ports:
      - "5173:80"
    volumes:
      - ./nginx/web/member-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - spring-member-gateway
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-admin-web:
    image: ${IMAGE_REGISTRY:-ghcr.io/hyunmyungchoi}/spring-admin-web:${IMAGE_TAG:-latest}
    container_name: spring-admin-web
    ports:
      - "5176:80"
    volumes:
      - ./nginx/web/admin-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - spring-admin-gateway
    networks:
      - spring-msa-network
    restart: unless-stopped

volumes:
  spring-msa-postgres-data:

networks:
  spring-msa-network:
    driver: bridge
