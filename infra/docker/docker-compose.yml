services:
  postgres:
    image: postgres:16
    container_name: spring-msa-postgres
    environment:
      POSTGRES_DB: msa
      POSTGRES_USER: msa
      POSTGRES_PASSWORD: msa
    ports:
      - "15432:5432"
    volumes:
      - spring-msa-postgres-data:/var/lib/postgresql/data
    networks:
      - spring-msa-network

  redis:
    image: redis:7-alpine
    container_name: spring-msa-redis
    ports:
      - "16379:6379"
    networks:
      - spring-msa-network

  spring-user-service:
    image: spring-react-msa/spring-user-service:latest
    container_name: spring-user-service
    build:
      context: ../../BackEnd/spring-user-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - redis
    networks:
      - spring-msa-network

  spring-community-service:
    image: spring-react-msa/spring-community-service:latest
    container_name: spring-community-service
    build:
      context: ../../BackEnd/spring-community-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8083"
    depends_on:
      - postgres
      - redis
    networks:
      - spring-msa-network

  spring-stock-service:
    image: spring-react-msa/spring-stock-service:latest
    container_name: spring-stock-service
    build:
      context: ../../BackEnd/spring-stock-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8084:8084"
    depends_on:
      - postgres
      - redis
    networks:
      - spring-msa-network

  spring-security-authorization-server:
    image: spring-react-msa/spring-security-authorization-server:latest
    container_name: spring-security-authorization-server
    build:
      context: ../../BackEnd/spring-security-authorization-server
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      AUTH_SERVER_ISSUER: http://spring-cloud-gateway:8080

      BFF_CLIENT_ID: bff-client
      BFF_CLIENT_SECRET_HASH: $$2a$$10$$BDeXFNHccQiu0ef5vYr/Bu0fAjSQzCgKc5NBppHdETy1G.W4KJzbS
      BFF_OAUTH2_REDIRECT_URI: http://localhost:8080/bff/auth/callback
      BFF_POST_LOGOUT_REDIRECT_URI: http://localhost:5173/auth

      ADMIN_BFF_CLIENT_ID: admin-bff-client
      ADMIN_BFF_CLIENT_SECRET_HASH: $$2a$$10$$Dm7Jh0Txq5XD7GRJXZSFFuIZQL1fMzpohFZJPM2EcFVPJNDsfveWi
      ADMIN_BFF_OAUTH2_REDIRECT_URI: http://localhost:8090/admin-bff/auth/callback
      ADMIN_BFF_POST_LOGOUT_REDIRECT_URI: http://localhost:5176
      ADMIN_BFF_POST_LOGOUT_LOGIN_REDIRECT_URI: http://localhost:5176/auth

      USER_FRONTEND_LOGIN_URI: http://localhost:5173/auth
      ADMIN_FRONTEND_LOGIN_URI: http://localhost:5176/auth
      USER_SERVICE_BASE_URL: http://spring-user-service:8081

      APP_OTP_EXPOSE_DEV_OTP: "true"
    ports:
      - "9000:9000"
    depends_on:
      - redis
      - spring-user-service
    networks:
      - spring-msa-network

  spring-bff-service:
    image: spring-react-msa/spring-bff-service:latest
    container_name: spring-bff-service
    build:
      context: ../../BackEnd/spring-bff-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker

      BFF_FRONTEND_REDIRECT_URI: http://localhost:5173

      BFF_OAUTH2_AUTHORIZATION_URI: http://localhost:8080/oauth2/authorize
      BFF_OAUTH2_TOKEN_URI: http://spring-cloud-gateway:8080/oauth2/token
      BFF_OAUTH2_USERINFO_URI: http://spring-cloud-gateway:8080/userinfo
      BFF_CLIENT_ID: bff-client
      BFF_CLIENT_SECRET: bff-secret
      BFF_OAUTH2_REDIRECT_URI: http://localhost:8080/bff/auth/callback
      BFF_OAUTH2_END_SESSION_URI: http://localhost:8080/connect/logout
      BFF_OAUTH2_LOGOUT_URI: http://localhost:8080/logout
      BFF_OAUTH2_SCOPE: openid profile

      BFF_API_COMMUNITY_ME_URI: http://spring-cloud-gateway:8080/api/community/me
      BFF_API_USER_ME_URI: http://spring-cloud-gateway:8080/api/user/me
      BFF_API_USER_SIGNUP_URI: http://spring-user-service:8081/internal/users
      BFF_API_STOCK_ME_URI: http://spring-cloud-gateway:8080/api/stock/me
    ports:
      - "8079:8079"
    depends_on:
      - redis
      - spring-security-authorization-server
    networks:
      - spring-msa-network

  spring-admin-bff-service:
    image: spring-react-msa/spring-admin-bff-service:latest
    container_name: spring-admin-bff-service
    build:
      context: ../../BackEnd/spring-admin-bff-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker

      ADMIN_BFF_FRONTEND_REDIRECT_URI: http://localhost:5176

      ADMIN_BFF_CLIENT_ID: admin-bff-client
      ADMIN_BFF_CLIENT_SECRET: admin-bff-secret
      
      ADMIN_BFF_OAUTH2_AUTHORIZATION_URI: http://localhost:8090/oauth2/authorize
      ADMIN_BFF_OAUTH2_TOKEN_URI: http://spring-admin-gateway:8090/oauth2/token
      ADMIN_BFF_OAUTH2_USERINFO_URI: http://spring-admin-gateway:8090/userinfo
      ADMIN_BFF_OAUTH2_REDIRECT_URI: http://localhost:8090/admin-bff/auth/callback
      ADMIN_BFF_OAUTH2_END_SESSION_URI: http://localhost:8090/connect/logout
      ADMIN_BFF_OAUTH2_LOGOUT_URI: http://localhost:8090/logout
      ADMIN_BFF_OAUTH2_SCOPE: openid profile

      ADMIN_BFF_API_USER_ME_URI: http://spring-cloud-gateway:8080/api/user/me
      ADMIN_BFF_API_USER_ADMIN_USERS_URI: http://spring-cloud-gateway:8080/api/user/admin/users
      ADMIN_BFF_API_USER_SIGNUP_URI: http://spring-user-service:8081/internal/users
    ports:
      - "8087:8087"
    depends_on:
      - redis
      - spring-security-authorization-server
    networks:
      - spring-msa-network

  spring-cloud-gateway:
    image: spring-react-msa/spring-cloud-gateway:latest
    container_name: spring-cloud-gateway
    build:
      context: ../../BackEnd/spring-cloud-gateway
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PUBLIC_ORIGIN: http://localhost:5173
      GATEWAY_CORS_ALLOWED_ORIGIN: http://localhost:5173
      GATEWAY_ADMIN_BFF_URI: http://localhost:8079
      GATEWAY_AUTHORIZATION_SERVER_URI: http://localhost:9000
    ports:
      - "8080:8080"
    depends_on:
      - spring-bff-service
      - spring-user-service
      - spring-community-service
      - spring-stock-service
      - spring-security-authorization-server
    networks:
      - spring-msa-network

  spring-admin-gateway:
    image: spring-react-msa/spring-admin-gateway:latest
    container_name: spring-admin-gateway
    build:
      context: ../../BackEnd/spring-admin-gateway
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ADMIN_PUBLIC_ORIGIN: http://localhost:5176
      ADMIN_GATEWAY_CORS_ALLOWED_ORIGIN: http://localhost:5176
      ADMIN_GATEWAY_ADMIN_BFF_URI: http://localhost:8087
      ADMIN_GATEWAY_AUTHORIZATION_SERVER_URI: http://localhost:9000
    ports:
      - "8090:8090"
    depends_on:
      - spring-admin-bff-service
      - spring-security-authorization-server
    networks:
      - spring-msa-network

  spring-shell-web:
    image: ${IMAGE_REGISTRY:-ghcr.io/hyunmyungchoi}/spring-shell-web:${IMAGE_TAG:-latest}
    container_name: spring-shell-web
    ports:
      - "5173:80"
    volumes:
      - ./nginx/user-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - spring-cloud-gateway
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-admin-web:
    image: ${IMAGE_REGISTRY:-ghcr.io/hyunmyungchoi}/spring-admin-web:${IMAGE_TAG:-latest}
    container_name: spring-admin-web
    ports:
      - "5176:80"
    volumes:
      - ./nginx/admin-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - spring-admin-gateway
    networks:
      - spring-msa-network
    restart: unless-stopped

volumes:
  spring-msa-postgres-data:

networks:
  spring-msa-network:
    driver: bridge
