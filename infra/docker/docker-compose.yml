services:
  postgres:
    image: postgres:16
    container_name: spring-msa-postgres
    environment:
      POSTGRES_DB: msa
      POSTGRES_USER: msa
      POSTGRES_PASSWORD: msa
    ports:
      - "15432:5432"
    volumes:
      - spring-msa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msa -d msa"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - spring-msa-network

  redis:
    image: redis:7-alpine
    container_name: spring-msa-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - spring-msa-network

  spring-user-service:
    image: spring-react-msa/spring-user-service:latest
    container_name: spring-user-service
    build:
      context: ../../BackEnd/spring-user-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-member-community-service:
    image: spring-react-msa/spring-member-community-service:latest
    container_name: spring-member-community-service
    build:
      context: ../../BackEnd/spring-member-community-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8083"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-member-stock-service:
    image: spring-react-msa/spring-member-stock-service:latest
    container_name: spring-member-stock-service
    build:
      context: ../../BackEnd/spring-member-stock-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8084"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-security-authorization-server:
    image: spring-react-msa/spring-security-authorization-server:latest
    container_name: spring-security-authorization-server
    build:
      context: ../../BackEnd/spring-security-authorization-server
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      AUTH_SERVER_ISSUER: http://spring-member-gateway:8080

      BFF_CLIENT_ID: bff-client
      BFF_CLIENT_SECRET_HASH: $$2a$$10$$BDeXFNHccQiu0ef5vYr/Bu0fAjSQzCgKc5NBppHdETy1G.W4KJzbS
      BFF_OAUTH2_REDIRECT_URI: http://localhost:5173/bff/login/oauth2/code/member-bff
      BFF_POST_LOGOUT_REDIRECT_URI: http://localhost:5173/auth

      ADMIN_BFF_CLIENT_ID: admin-bff-client
      ADMIN_BFF_CLIENT_SECRET_HASH: $$2a$$10$$Dm7Jh0Txq5XD7GRJXZSFFuIZQL1fMzpohFZJPM2EcFVPJNDsfveWi
      ADMIN_BFF_OAUTH2_REDIRECT_URI: http://localhost:5176/admin-bff/login/oauth2/code/admin-bff
      ADMIN_BFF_POST_LOGOUT_REDIRECT_URI: http://localhost:5176
      ADMIN_BFF_POST_LOGOUT_LOGIN_REDIRECT_URI: http://localhost:5176/auth

      USER_FRONTEND_LOGIN_URI: http://localhost:5173/auth
      ADMIN_FRONTEND_LOGIN_URI: http://localhost:5176/auth
      USER_SERVICE_BASE_URL: http://spring-user-service:8081
    ports:
      - "9000:9000"
    depends_on:
      redis:
        condition: service_healthy
      spring-user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-member-bff-service:
    image: spring-react-msa/spring-member-bff-service:latest
    container_name: spring-member-bff-service
    build:
      context: ../../BackEnd
      dockerfile: spring-member-bff-service/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker

      BFF_FRONTEND_REDIRECT_URI: http://localhost:5173

      BFF_OAUTH2_AUTHORIZATION_URI: http://localhost:5173/oauth2/authorize
      BFF_OAUTH2_TOKEN_URI: http://spring-member-gateway:8080/oauth2/token
      BFF_OAUTH2_USERINFO_URI: http://spring-member-gateway:8080/userinfo
      BFF_OAUTH2_JWK_SET_URI: http://spring-member-gateway:8080/oauth2/jwks
      BFF_CLIENT_ID: bff-client
      BFF_CLIENT_SECRET: bff-secret
      BFF_OAUTH2_REDIRECT_URI: http://localhost:5173/bff/login/oauth2/code/member-bff
      BFF_OAUTH2_END_SESSION_URI: http://localhost:5173/connect/logout
      BFF_OAUTH2_LOGOUT_URI: http://localhost:5173/logout

      BFF_API_USER_API_BASE_URL: http://spring-user-service:8081
      BFF_API_USER_INTERNAL_BASE_URL: http://spring-user-service:8081
      BFF_API_COMMUNITY_API_BASE_URL: http://spring-member-community-service:8083
      BFF_API_STOCK_API_BASE_URL: http://spring-member-stock-service:8084
    ports:
      - "8079:8079"
    depends_on:
      redis:
        condition: service_healthy
      spring-security-authorization-server:
        condition: service_healthy
      spring-user-service:
        condition: service_healthy
      spring-member-community-service:
        condition: service_healthy
      spring-member-stock-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8079"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-admin-bff-service:
    image: spring-react-msa/spring-admin-bff-service:latest
    container_name: spring-admin-bff-service
    build:
      context: ../../BackEnd/spring-admin-bff-service
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker

      ADMIN_BFF_FRONTEND_REDIRECT_URI: http://localhost:5176

      ADMIN_BFF_OAUTH2_AUTHORIZATION_URI: http://localhost:5176/oauth2/authorize
      ADMIN_BFF_OAUTH2_TOKEN_URI: http://spring-admin-gateway:8090/oauth2/token
      ADMIN_BFF_OAUTH2_USERINFO_URI: http://spring-admin-gateway:8090/userinfo
      ADMIN_BFF_OAUTH2_JWK_SET_URI: http://spring-admin-gateway:8090/oauth2/jwks
      ADMIN_BFF_CLIENT_ID: admin-bff-client
      ADMIN_BFF_CLIENT_SECRET: admin-bff-secret
      ADMIN_BFF_OAUTH2_REDIRECT_URI: http://localhost:5176/admin-bff/login/oauth2/code/admin-bff
      ADMIN_BFF_OAUTH2_END_SESSION_URI: http://localhost:5176/connect/logout
      ADMIN_BFF_OAUTH2_LOGOUT_URI: http://localhost:5176/logout

      ADMIN_BFF_API_USER_API_BASE_URL: http://spring-member-gateway:8080
      ADMIN_BFF_API_USER_INTERNAL_BASE_URL: http://spring-user-service:8081
    ports:
      - "8087:8087"
    depends_on:
      redis:
        condition: service_healthy
      spring-security-authorization-server:
        condition: service_healthy
      spring-user-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8087"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-member-gateway:
    image: spring-react-msa/spring-member-gateway:latest
    container_name: spring-member-gateway
    build:
      context: ../../BackEnd/spring-member-gateway
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      PUBLIC_ORIGIN: localhost:5173
      GATEWAY_CORS_ALLOWED_ORIGIN: http://localhost:5173
      GATEWAY_BFF_URI: http://spring-member-bff-service:8079
      GATEWAY_AUTHORIZATION_SERVER_URI: http://spring-security-authorization-server:9000
    ports:
      - "8080:8080"
    depends_on:
      spring-member-bff-service:
        condition: service_healthy
      spring-user-service:
        condition: service_healthy
      spring-member-community-service:
        condition: service_healthy
      spring-member-stock-service:
        condition: service_healthy
      spring-security-authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-admin-gateway:
    image: spring-react-msa/spring-admin-gateway:latest
    container_name: spring-admin-gateway
    build:
      context: ../../BackEnd/spring-admin-gateway
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ADMIN_GATEWAY_CORS_ALLOWED_ORIGIN: http://localhost:5176
      ADMIN_GATEWAY_ADMIN_BFF_URI: http://spring-admin-bff-service:8087
      ADMIN_GATEWAY_AUTHORIZATION_SERVER_URI: http://spring-security-authorization-server:9000
    ports:
      - "8090:8090"
    depends_on:
      spring-admin-bff-service:
        condition: service_healthy
      spring-security-authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8090"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - spring-msa-network

  spring-member-web:
    image: spring-react-msa/spring-member-web:latest
    container_name: spring-member-web
    build:
      context: ../..
      dockerfile: FrontEnd/apps/member/Dockerfile
    ports:
      - "5173:80"
    volumes:
      - ./nginx/member-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      spring-member-gateway:
        condition: service_healthy
    networks:
      - spring-msa-network
    restart: unless-stopped

  spring-admin-web:
    image: spring-react-msa/spring-admin-web:latest
    container_name: spring-admin-web
    build:
      context: ../..
      dockerfile: FrontEnd/apps/admin/Dockerfile
    ports:
      - "5176:80"
    volumes:
      - ./nginx/admin-web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      spring-admin-gateway:
        condition: service_healthy
    networks:
      - spring-msa-network
    restart: unless-stopped

volumes:
  spring-msa-postgres-data:

networks:
  spring-msa-network:
    driver: bridge
